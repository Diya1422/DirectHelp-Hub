<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - DirectHelp Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .back-btn {
      position: absolute;
      top: 20px; left: 20px;
      padding: 10px 18px;
      border: none; border-radius: 10px;
      background: white; color: #333;
      font-size: 15px; cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: 0.3s;
      display: flex; align-items: center; gap: 8px;
    }
    .back-btn:hover { transform: translateY(-2px); background: #f5f5f5; }
    .login-card {
      width: 380px;
      background: white;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-icon { font-size: 60px; color: #667eea; margin-bottom: 15px; }
    h2 { margin-bottom: 8px; color: #333; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .input-box {
      width: 100%; padding: 12px;
      border: 1px solid #ddd; border-radius: 10px;
      margin-bottom: 15px; font-size: 15px;
    }
    .input-box:focus { outline: none; border-color: #667eea; }
    .error-msg { color: #f5576c; font-size: 13px; margin: -8px 0 12px; display: none; }
    .login-btn {
      width: 100%; padding: 12px;
      border: none; border-radius: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <button class="back-btn" onclick="window.location.href='index.html'">
    <i class="fas fa-arrow-left"></i> Back to Home
  </button>

  <div class="login-card">
    <div class="login-icon"><i class="fas fa-user-shield"></i></div>
    <h2>Admin Login</h2>
    <p class="subtitle">DirectHelp Hub Admin Panel</p>
    <input type="password" id="pass" class="input-box" placeholder="Enter Password"
           onkeydown="if(event.key==='Enter') login()">
    <p class="error-msg" id="errMsg">
      <i class="fas fa-times-circle"></i> Incorrect password. Try again.
    </p>
    <button class="login-btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </div>

  <script>
    function login() {
      if (document.getElementById('pass').value === 'admin123') {
        sessionStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('errMsg').style.display = 'block';
        document.getElementById('pass').value = '';
        document.getElementById('pass').focus();
      }
    }
  </script>

</body>
</html>
